<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦚</text></svg>">
    <title>Change Background</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    
    <div class="container">
        <h1>Change Background Color</h1>
        
        <div class="color">
            <input id="color-input" type="text" placeholder="Enter Color">
        </div>
        
        <div class="apply">
            <button id="apply-color">Apply Color</button>
            <button id="generate-color">Generate Random Color</button>
        </div>
    </div>
    
    <div class="pop-container active">
        <div class="message">
                <div class="error">
                    <i class="fa-solid fa-face-frown"></i>
                    <p>ERROR!</p>
                </div>
                <h4>Oops! Please enter a color name to continue.</h4>
                <button class="close">Close</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
